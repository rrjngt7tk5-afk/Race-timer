<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Regularity Race Timer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');

  :root {
    --bg:        #080c08;
    --panel:     #0d120d;
    --border:    #1a261a;
    --green:     #00e676;
    --green-dim: #003d15;
    --amber:     #ffab00;
    --amber-dim: #3d2900;
    --red:       #ff5252;
    --red-dim:   #3d0000;
    --muted:     #2e4a2e;
    --text-dim:  #3a5a3a;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .screen { display: none; flex-direction: column; height: 100vh; padding: 16px; overflow-y: auto; }
  .screen.active { display: flex; }

  /* ── NAV BAR ─────────────────────────────────────────────────────────────── */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .nav-bar h2 {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .nav-tabs {
    display: flex;
    gap: 6px;
  }

  .nav-tab {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    touch-action: manipulation;
    text-transform: uppercase;
  }

  .nav-tab.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  .nav-tab:active { opacity: 0.7; }

  /* ── SETTINGS ────────────────────────────────────────────────────────────── */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .setting-row label {
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    color: #7aaa7a;
  }

  .digit-group { display: flex; align-items: center; gap: 2px; }
  .digit-sep { color: var(--muted); font-family: var(--mono); font-size: 1.2rem; padding: 0 2px; }

  .digit-box { display: flex; flex-direction: column; align-items: center; }

  .digit-btn {
    background: none; border: none; color: var(--muted);
    font-size: 0.65rem; padding: 4px 8px; cursor: pointer;
    line-height: 1; touch-action: manipulation;
  }
  .digit-btn:active { color: var(--green); }

  .digit-val {
    font-family: var(--mono); font-size: 1.35rem; color: var(--amber);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 3px; width: 2.2ch; text-align: center;
    padding: 4px 0; line-height: 1;
  }

  /* toggle */
  .toggle-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .toggle-row label { font-size: 0.78rem; letter-spacing: 0.06em; color: #7aaa7a; }

  .toggle {
    position: relative; width: 44px; height: 24px; cursor: pointer;
    touch-action: manipulation;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: var(--border);
    border-radius: 24px; transition: background 0.2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute; width: 18px; height: 18px;
    left: 3px; top: 3px; background: var(--muted);
    border-radius: 50%; transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--green-dim); }
  .toggle input:checked + .toggle-slider:before {
    transform: translateX(20px); background: var(--green);
  }

  /* ── LANDMARKS ───────────────────────────────────────────────────────────── */
  .landmark-list {
    flex: 1; overflow-y: auto; margin-bottom: 12px;
  }

  .landmark-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }

  .landmark-name {
    font-family: var(--mono); font-size: 0.85rem;
    color: var(--amber); width: 80px; flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .landmark-meta {
    flex: 1; font-size: 0.7rem; color: var(--muted);
    letter-spacing: 0.05em; line-height: 1.5;
  }

  .landmark-meta span { display: block; }
  .landmark-meta .lm-display { color: #4a8a4a; font-family: var(--mono); }

  .landmark-del {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-size: 0.7rem; padding: 4px 8px;
    border-radius: 3px; cursor: pointer; touch-action: manipulation;
    flex-shrink: 0;
  }
  .landmark-del:active { color: var(--red); border-color: var(--red); }

  .landmark-empty {
    text-align: center; color: var(--muted);
    font-size: 0.75rem; padding: 32px 0;
    letter-spacing: 0.08em;
  }

  /* Add landmark form */
  .add-landmark {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 14px; flex-shrink: 0;
  }

  .add-landmark h3 {
    font-size: 0.65rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
  }

  .add-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }

  .add-row label { font-size: 0.75rem; color: #7aaa7a; }

  input[type=text].name-input {
    background: var(--bg); border: 1px solid var(--green-dim);
    border-radius: 2px; color: var(--amber);
    font-family: var(--mono); font-size: 1rem;
    padding: 6px 10px; width: 130px; outline: none;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  input[type=text].name-input:focus { border-color: var(--green); }

  .add-btn {
    width: 100%; padding: 10px;
    background: var(--green-dim); border: 1px solid var(--green);
    border-radius: 3px; color: var(--green);
    font-family: var(--mono); font-size: 0.8rem;
    letter-spacing: 0.15em; cursor: pointer;
    text-transform: uppercase; touch-action: manipulation;
    margin-top: 4px;
  }
  .add-btn:active { background: var(--green); color: var(--bg); }

  /* ── RACE SCREEN ─────────────────────────────────────────────────────────── */
  #race-screen { justify-content: space-between; overflow: hidden; }

  .laps-container {
    display: flex; flex-direction: column;
    gap: 10px; flex: 1; justify-content: center;
  }

  .lap-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 4px;
    border: 1px solid transparent; transition: all 0.2s;
  }

  .lap-row.inactive { opacity: 0.22; }
  .lap-row.active   { border-color: var(--green-dim); background: #0a160a; }
  .lap-row.done     { opacity: 0.6; }

  .lap-label {
    font-family: var(--sans); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); width: 44px; flex-shrink: 0;
  }
  .lap-row.active .lap-label { color: #4a8a4a; }

  .lap-time {
    font-family: var(--mono); flex: 1;
    letter-spacing: 0.04em; transition: color 0.3s;
  }

  .lap-row.active   .lap-time { font-size: clamp(2.4rem, 9vw, 3.4rem); color: var(--green); }
  .lap-row.inactive .lap-time,
  .lap-row.done     .lap-time { font-size: clamp(1.2rem, 5vw, 1.8rem); }

  .lap-row.done .lap-time.negative { color: var(--green); }
  .lap-row.done .lap-time.positive { color: var(--red); }
  .lap-row.done .lap-time.zero     { color: var(--green); }

  /* beep flash overlay */
  .beep-flash {
    position: fixed; inset: 0; background: rgba(0,230,118,0.12);
    pointer-events: none; opacity: 0; z-index: 100;
    transition: opacity 0.05s;
  }
  .beep-flash.on { opacity: 1; }

  /* countdown overlay */
  .cd-overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; z-index: 90;
    transition: opacity 0.15s;
    background: rgba(8,12,8,0.7);
  }
  .cd-overlay.on { opacity: 1; }

  .cd-label {
    font-family: var(--mono);
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .cd-number {
    font-family: var(--mono);
    font-size: clamp(5rem, 30vw, 9rem);
    color: var(--green);
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,230,118,0.4);
    transition: transform 0.05s;
  }

  .cd-number.pulse {
    transform: scale(1.15);
    color: #fff;
  }

  /* ── RESULT SCREEN ───────────────────────────────────────────────────────── */
  #result-screen { justify-content: space-between; overflow: hidden; }

  .result-laps { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: center; }

  .result-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid var(--border); border-radius: 4px;
  }

  .result-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); width: 44px; flex-shrink: 0;
  }

  .result-time {
    font-family: var(--mono); font-size: clamp(1.6rem, 6vw, 2.2rem); flex: 1;
  }
  .result-time.negative { color: var(--green); }
  .result-time.positive { color: var(--red); }
  .result-time.zero     { color: var(--green); }

  .penalty-row {
    border-top: 1px solid var(--border); padding-top: 16px;
    margin-bottom: 12px; display: flex;
    justify-content: space-between; align-items: baseline;
    flex-shrink: 0;
  }

  .penalty-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }

  .penalty-value {
    font-family: var(--mono); font-size: clamp(1.8rem, 7vw, 2.6rem); color: var(--amber);
  }

  /* ── ACTION BUTTON ───────────────────────────────────────────────────────── */
  .action-area { padding-top: 12px; flex-shrink: 0; }

  .action-btn {
    width: 100%; padding: 18px; border-radius: 4px;
    font-family: var(--mono); font-size: 1rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; border: 2px solid;
    transition: background 0.1s, color 0.1s;
    touch-action: manipulation; user-select: none;
  }

  .action-btn.start  { background: var(--green-dim); border-color: var(--green);  color: var(--green); }
  .action-btn.lap    { background: var(--amber-dim); border-color: var(--amber);  color: var(--amber); }
  .action-btn.finish { background: var(--red-dim);   border-color: var(--red);    color: var(--red); }
  .action-btn.reset  { background: var(--panel);     border-color: var(--muted);  color: var(--muted); }
  .action-btn:active { filter: brightness(1.5); }

  .btn-hint {
    text-align: center; font-size: 0.6rem; letter-spacing: 0.1em;
    color: var(--muted); margin-top: 6px; text-transform: uppercase;
  }

  /* ── NAVIGATOR SCREEN ───────────────────────────────────────────────────── */
  #nav-screen { justify-content: space-between; overflow: hidden; }

  .nav-laps-mini {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    margin-bottom: 10px;
  }

  .nav-lap-chip {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 8px;
    text-align: center;
  }

  .nav-lap-chip.active {
    border-color: var(--green-dim);
    background: #0a160a;
  }

  .nav-lap-chip.done { opacity: 0.45; }

  .nav-lap-chip .chip-label {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 3px;
  }

  .nav-lap-chip .chip-time {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--green);
  }

  .nav-lap-chip.active .chip-time { color: var(--green); }
  .nav-lap-chip.done   .chip-time.negative { color: var(--green); }
  .nav-lap-chip.done   .chip-time.positive { color: var(--red); }

  /* landmark list */
  .nav-lm-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .nav-lm-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: opacity 0.3s, border-color 0.2s, background 0.2s;
  }

  .nav-lm-row.upcoming  { opacity: 0.35; }

  .nav-lm-row.next {
    border-color: var(--amber-dim);
    background: #1a1000;
  }

  .nav-lm-row.passed {
    opacity: 0.18;
  }

  .nav-lm-name {
    font-family: var(--mono);
    font-size: 0.95rem;
    color: var(--amber);
    width: 80px;
    flex-shrink: 0;
  }

  .nav-lm-row.next .nav-lm-name { color: var(--amber); font-size: 1.05rem; }
  .nav-lm-row.passed .nav-lm-name { color: var(--muted); }

  .nav-lm-display {
    font-family: var(--mono);
    font-size: 1rem;
    color: #4a8a4a;
    flex: 1;
  }

  .nav-lm-row.next .nav-lm-display { color: var(--green); font-size: 1.1rem; }
  .nav-lm-row.passed .nav-lm-display { color: var(--muted); text-decoration: line-through; }

  /* finish row */
  .nav-lm-row.finish-row { border-color: var(--border); }
  .nav-lm-row.finish-row .nav-lm-name { color: var(--muted); }
  .nav-lm-row.next.finish-row { border-color: var(--red-dim); background: #1a0000; }
  .nav-lm-row.next.finish-row .nav-lm-name { color: var(--red); }
  .nav-lm-row.next.finish-row .nav-lm-display { color: var(--red); }
    background: var(--green-dim); border: 1px solid var(--green);
    border-radius: 4px; color: var(--green);
    font-family: var(--mono); font-size: 0.85rem;
    letter-spacing: 0.15em; cursor: pointer;
    text-transform: uppercase; touch-action: manipulation;
  }
  .btn-primary:active { background: var(--green); color: var(--bg); }
</style>
</head>
<body>

<div class="beep-flash" id="beep-flash"></div>
<div class="cd-overlay" id="cd-overlay">
  <div class="cd-label" id="cd-label"></div>
  <div class="cd-number" id="cd-number"></div>
</div>

<!-- ── SETTINGS SCREEN ──────────────────────────────────────────────────── -->
<div id="settings-screen" class="screen active">
  <div class="nav-bar">
    <h2>Settings</h2>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showScreen('settings-screen')">Settings</button>
      <button class="nav-tab" onclick="showScreen('landmarks-screen')">Landmarks</button>
      <button class="nav-tab" onclick="goToRace()">Race</button>
    </div>
  </div>

  <div class="setting-row">
    <label>Ideal Lap Time</label>
    <div class="digit-group">
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('lt_m1',1)">▲</button>
        <div class="digit-val" id="lt_m1">0</div>
        <button class="digit-btn" onclick="adjDigit('lt_m1',-1)">▼</button>
      </div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('lt_m0',1)">▲</button>
        <div class="digit-val" id="lt_m0">4</div>
        <button class="digit-btn" onclick="adjDigit('lt_m0',-1)">▼</button>
      </div>
      <div class="digit-sep">:</div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('lt_s1',1,5)">▲</button>
        <div class="digit-val" id="lt_s1">1</div>
        <button class="digit-btn" onclick="adjDigit('lt_s1',-1,5)">▼</button>
      </div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('lt_s0',1)">▲</button>
        <div class="digit-val" id="lt_s0">9</div>
        <button class="digit-btn" onclick="adjDigit('lt_s0',-1)">▼</button>
      </div>
      <div class="digit-sep">.</div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('lt_h1',1,9)">▲</button>
        <div class="digit-val" id="lt_h1">0</div>
        <button class="digit-btn" onclick="adjDigit('lt_h1',-1,9)">▼</button>
      </div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('lt_h0',1)">▲</button>
        <div class="digit-val" id="lt_h0">0</div>
        <button class="digit-btn" onclick="adjDigit('lt_h0',-1)">▼</button>
      </div>
    </div>
  </div>

  <div class="setting-row">
    <label>Number of Laps</label>
    <div class="digit-group">
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('laps',1,9,1)">▲</button>
        <div class="digit-val" id="laps">3</div>
        <button class="digit-btn" onclick="adjDigit('laps',-1,9,1)">▼</button>
      </div>
    </div>
  </div>

  <div class="setting-row">
    <label>Track Length (m)</label>
    <div class="digit-group">
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('tr_d3',1)">▲</button>
        <div class="digit-val" id="tr_d3">2</div>
        <button class="digit-btn" onclick="adjDigit('tr_d3',-1)">▼</button>
      </div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('tr_d2',1)">▲</button>
        <div class="digit-val" id="tr_d2">0</div>
        <button class="digit-btn" onclick="adjDigit('tr_d2',-1)">▼</button>
      </div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('tr_d1',1)">▲</button>
        <div class="digit-val" id="tr_d1">9</div>
        <button class="digit-btn" onclick="adjDigit('tr_d1',-1)">▼</button>
      </div>
      <div class="digit-box">
        <button class="digit-btn" onclick="adjDigit('tr_d0',1)">▲</button>
        <div class="digit-val" id="tr_d0">4</div>
        <button class="digit-btn" onclick="adjDigit('tr_d0',-1)">▼</button>
      </div>
    </div>
  </div>

  <div class="toggle-row">
    <label>Lap / Finish countdown (10 beeps)</label>
    <label class="toggle">
      <input type="checkbox" id="toggle-lap-countdown" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <label>Landmark countdown (10 beeps)</label>
    <label class="toggle">
      <input type="checkbox" id="toggle-lm-countdown" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <button class="btn-primary" onclick="goToRace()">▶ Go to Race</button>
</div>

<!-- ── LANDMARKS SCREEN ──────────────────────────────────────────────────── -->
<div id="landmarks-screen" class="screen">
  <div class="nav-bar">
    <h2>Landmarks</h2>
    <div class="nav-tabs">
      <button class="nav-tab" onclick="showScreen('settings-screen')">Settings</button>
      <button class="nav-tab active" onclick="showScreen('landmarks-screen')">Landmarks</button>
      <button class="nav-tab" onclick="goToRace()">Race</button>
    </div>
  </div>

  <div class="landmark-list" id="landmark-list">
    <div class="landmark-empty" id="lm-empty">No landmarks added yet</div>
  </div>

  <div class="add-landmark">
    <h3>Add Landmark</h3>
    <div class="add-row">
      <label>Name (max 8 chars)</label>
      <input type="text" class="name-input" id="lm-name" maxlength="8" placeholder="BRIDGE">
    </div>
    <div class="add-row">
      <label>Distance (m)</label>
      <div class="digit-group">
        <div class="digit-box">
          <button class="digit-btn" onclick="adjDigit('lm_d3',1)">▲</button>
          <div class="digit-val" id="lm_d3">0</div>
          <button class="digit-btn" onclick="adjDigit('lm_d3',-1)">▼</button>
        </div>
        <div class="digit-box">
          <button class="digit-btn" onclick="adjDigit('lm_d2',1)">▲</button>
          <div class="digit-val" id="lm_d2">0</div>
          <button class="digit-btn" onclick="adjDigit('lm_d2',-1)">▼</button>
        </div>
        <div class="digit-box">
          <button class="digit-btn" onclick="adjDigit('lm_d1',1)">▲</button>
          <div class="digit-val" id="lm_d1">0</div>
          <button class="digit-btn" onclick="adjDigit('lm_d1',-1)">▼</button>
        </div>
        <div class="digit-box">
          <button class="digit-btn" onclick="adjDigit('lm_d0',1)">▲</button>
          <div class="digit-val" id="lm_d0">0</div>
          <button class="digit-btn" onclick="adjDigit('lm_d0',-1)">▼</button>
        </div>
      </div>
    </div>
    <button class="add-btn" onclick="addLandmark()">+ Add Landmark</button>
  </div>
</div>

<!-- ── RACE SCREEN ───────────────────────────────────────────────────────── -->
<div id="race-screen" class="screen">
  <div class="nav-bar" style="margin-bottom:8px;">
    <h2 id="race-nav-label">Ready</h2>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchRaceView('race-screen')">Timer</button>
      <button class="nav-tab" onclick="switchRaceView('nav-screen')">Navigator</button>
      <button class="nav-tab" onclick="abortRace()">⚙</button>
    </div>
  </div>
  <div class="laps-container" id="laps-container"></div>
  <div class="action-area">
    <button class="action-btn start" id="action-btn" onclick="handleAction()">(a) START</button>
    <div class="btn-hint" id="btn-hint"></div>
  </div>
</div>

<!-- ── NAVIGATOR SCREEN ──────────────────────────────────────────────────── -->
<div id="nav-screen" class="screen">
  <div class="nav-bar" style="margin-bottom:8px;">
    <h2 id="nav-nav-label">Ready</h2>
    <div class="nav-tabs">
      <button class="nav-tab" onclick="switchRaceView('race-screen')">Timer</button>
      <button class="nav-tab active" onclick="switchRaceView('nav-screen')">Navigator</button>
      <button class="nav-tab" onclick="abortRace()">⚙</button>
    </div>
  </div>
  <div class="nav-laps-mini" id="nav-laps-mini"></div>
  <div class="nav-lm-list" id="nav-lm-list"></div>
  <div class="action-area">
    <button class="action-btn start" id="nav-action-btn" onclick="handleAction()">(a) START</button>
    <div class="btn-hint" id="nav-btn-hint"></div>
  </div>
</div>

<!-- ── RESULT SCREEN ─────────────────────────────────────────────────────── -->
<div id="result-screen" class="screen">
  <div class="nav-bar">
    <h2>Result</h2>
    <div class="nav-tabs">
      <button class="nav-tab" onclick="showScreen('settings-screen')">Settings</button>
      <button class="nav-tab" onclick="showScreen('landmarks-screen')">Landmarks</button>
    </div>
  </div>
  <div class="result-laps" id="result-laps"></div>
  <div class="penalty-row">
    <span class="penalty-label">Penalty</span>
    <span class="penalty-value" id="penalty-value">0.00s</span>
  </div>
  <div class="action-area">
    <button class="action-btn reset" onclick="goToRace()">(a) RESET</button>
  </div>
</div>

<script>
// ── Audio context ─────────────────────────────────────────────────────────────
let audioCtx = null;
let cdHideTimer = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq = 880, duration = 0.08, volume = 0.6) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);

    // Visual flash
    const flash = document.getElementById('beep-flash');
    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 80);
  } catch(e) {}
}

function showCountdown(label, number) {
  const overlay = document.getElementById('cd-overlay');
  const lbl     = document.getElementById('cd-label');
  const num     = document.getElementById('cd-number');
  lbl.textContent = label;
  num.textContent = number;
  overlay.classList.add('on');
  num.classList.remove('pulse');
  // pulse effect
  requestAnimationFrame(() => {
    num.classList.add('pulse');
    setTimeout(() => num.classList.remove('pulse'), 120);
  });
  // hide after 0.85s (just before next beep)
  if (cdHideTimer) clearTimeout(cdHideTimer);
  cdHideTimer = setTimeout(() => {
    overlay.classList.remove('on');
  }, 850);
}

function hideCountdown() {
  if (cdHideTimer) clearTimeout(cdHideTimer);
  document.getElementById('cd-overlay').classList.remove('on');
}

function beepLandmark() { beep(1047, 0.1, 0.7); }
function beepCountdown(label, number) {
  beep(660, 0.07, 0.4);
  showCountdown(label, number);
}
function beepFinish() {
  beep(880, 0.08, 0.8);
  setTimeout(() => beep(1047, 0.15, 0.8), 100);
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  idealSecs: 259,
  numLaps: 3,
  trackLen: 2094,
  landmarks: [],        // [{name, meters, triggerSecs}]
  lapCountdown: true,
  lmCountdown: true,
  lapResults: [],
  currentLap: 0,
  lapStartTime: null,   // performance.now()
  phase: 'pre',
  rafId: null,
  // beep scheduling
  firedBeeps: new Set(), // keys fired this lap
};

// ── Digit helpers ─────────────────────────────────────────────────────────────
function adjDigit(id, delta, max=9, min=0) {
  const el = document.getElementById(id);
  let v = parseInt(el.textContent) + delta;
  if (v > max) v = min;
  if (v < min) v = max;
  el.textContent = v;
}

function getDigit(id) { return parseInt(document.getElementById(id).textContent); }

function readSettings() {
  const mins = getDigit('lt_m1')*10 + getDigit('lt_m0');
  const secs = getDigit('lt_s1')*10 + getDigit('lt_s0');
  const huns = getDigit('lt_h1')*10 + getDigit('lt_h0');
  state.idealSecs   = mins*60 + secs + huns/100;
  state.numLaps     = getDigit('laps');
  state.trackLen    = getDigit('tr_d3')*1000 + getDigit('tr_d2')*100 + getDigit('tr_d1')*10 + getDigit('tr_d0');
  state.lapCountdown = document.getElementById('toggle-lap-countdown').checked;
  state.lmCountdown  = document.getElementById('toggle-lm-countdown').checked;
  recalcLandmarks();
}

// ── Screen management ─────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // update nav tab highlights
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.remove('active');
  });
}

function abortRace() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  noSleep.disable();
  state.phase = 'pre';
  showScreen('settings-screen');
}

// ── Landmarks ─────────────────────────────────────────────────────────────────
function recalcLandmarks() {
  state.landmarks.forEach(lm => {
    lm.triggerSecs = (lm.meters / state.trackLen) * state.idealSecs;
  });
}

function addLandmark() {
  const name = document.getElementById('lm-name').value.trim().toUpperCase().slice(0,8);
  if (!name) { alert('Please enter a landmark name.'); return; }
  const meters = getDigit('lm_d3')*1000 + getDigit('lm_d2')*100 + getDigit('lm_d1')*10 + getDigit('lm_d0');
  if (meters === 0) { alert('Please set a distance greater than 0.'); return; }

  readSettings();
  const triggerSecs = (meters / state.trackLen) * state.idealSecs;
  state.landmarks.push({ name, meters, triggerSecs });
  state.landmarks.sort((a,b) => a.meters - b.meters);
  document.getElementById('lm-name').value = '';
  renderLandmarks();
}

function deleteLandmark(i) {
  state.landmarks.splice(i, 1);
  renderLandmarks();
}

function renderLandmarks() {
  const list = document.getElementById('landmark-list');
  const empty = document.getElementById('lm-empty');
  // clear except empty msg
  Array.from(list.children).forEach(c => { if (c !== empty) c.remove(); });

  if (state.landmarks.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  readSettings();
  state.landmarks.forEach((lm, i) => {
    const rem = state.idealSecs - lm.triggerSecs;
    const div = document.createElement('div');
    div.className = 'landmark-item';
    div.innerHTML = `
      <div class="landmark-name">${lm.name}</div>
      <div class="landmark-meta">
        <span>${lm.meters} m</span>
        <span class="lm-display">Display: ${fmtTimer(rem)}</span>
      </div>
      <button class="landmark-del" onclick="deleteLandmark(${i})">✕</button>
    `;
    list.appendChild(div);
  });
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtTimer(remaining) {
  const isOver = remaining < 0;
  const sign   = isOver ? '+' : '\u2212';
  const abs    = Math.abs(remaining);
  const m      = Math.floor(abs / 60);
  const s      = Math.floor(abs % 60);
  const h      = Math.floor((abs % 1) * 100);
  return sign + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + '.' + String(h).padStart(2,'0');
}

function timerClass(remaining) {
  if (Math.abs(remaining) < 0.01) return 'zero';
  return remaining > 0 ? 'negative' : 'positive';
}

// ── Race view switching ───────────────────────────────────────────────────────
let currentRaceView = 'race-screen';

function switchRaceView(id) {
  currentRaceView = id;
  // only switch between race/nav screens while racing
  ['race-screen','nav-screen'].forEach(s => {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// ── Race ──────────────────────────────────────────────────────────────────────
function goToRace() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  readSettings();
  state.lapResults   = [];
  state.currentLap   = 0;
  state.lapStartTime = null;
  state.phase        = 'pre';
  state.firedBeeps   = new Set();
  currentRaceView    = 'race-screen';
  buildLapRows();
  buildNavScreen();
  updateActionBtn();
  showScreen('race-screen');
  document.getElementById('race-nav-label').textContent = 'Ready';
  document.getElementById('nav-nav-label').textContent  = 'Ready';
}

function buildLapRows() {
  const container = document.getElementById('laps-container');
  container.innerHTML = '';
  for (let i = 0; i < state.numLaps; i++) {
    const row = document.createElement('div');
    row.className = 'lap-row inactive';
    row.id = `lap-row-${i}`;
    row.innerHTML = `
      <div class="lap-label">LAP ${i+1}</div>
      <div class="lap-time" id="lap-time-${i}">${fmtTimer(state.idealSecs)}</div>
    `;
    container.appendChild(row);
  }
}

function buildNavScreen() {
  // Mini lap chips
  const mini = document.getElementById('nav-laps-mini');
  mini.innerHTML = '';
  for (let i = 0; i < state.numLaps; i++) {
    const chip = document.createElement('div');
    chip.className = 'nav-lap-chip inactive';
    chip.id = `nav-chip-${i}`;
    chip.innerHTML = `<span class="chip-label">LAP ${i+1}</span><span class="chip-time" id="nav-chip-time-${i}">${fmtTimer(state.idealSecs)}</span>`;
    mini.appendChild(chip);
  }

  // Landmark list with finish row
  const list = document.getElementById('nav-lm-list');
  list.innerHTML = '';

  const allItems = [
    ...state.landmarks.map(lm => ({
      name: lm.name,
      displayRemaining: state.idealSecs - lm.triggerSecs,
      triggerSecs: lm.triggerSecs,
      isFinish: false
    })),
    {
      name: 'FINISH',
      displayRemaining: 0,
      triggerSecs: state.idealSecs,
      isFinish: true
    }
  ];
  allItems.sort((a,b) => a.triggerSecs - b.triggerSecs);

  allItems.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'nav-lm-row upcoming' + (item.isFinish ? ' finish-row' : '');
    row.id = `nav-lm-row-${i}`;
    row.innerHTML = `
      <div class="nav-lm-name">${item.name}</div>
      <div class="nav-lm-display">${fmtTimer(item.displayRemaining)}</div>
    `;
    list.appendChild(row);
  });

  // store allItems on state for update use
  state.navItems = allItems;
}

function updateNavScreen(elapsed, currentRemaining) {
  // Update mini chips
  for (let i = 0; i < state.numLaps; i++) {
    const chip     = document.getElementById(`nav-chip-${i}`);
    const timeEl   = document.getElementById(`nav-chip-time-${i}`);
    if (i < state.currentLap) {
      chip.className = 'nav-lap-chip done';
      const res = state.lapResults[i];
      timeEl.textContent = fmtTimer(res);
      timeEl.className = 'chip-time ' + timerClass(res);
    } else if (i === state.currentLap && state.phase === 'running') {
      chip.className = 'nav-lap-chip active';
      timeEl.textContent = fmtTimer(currentRemaining);
      timeEl.className = 'chip-time';
    } else {
      chip.className = 'nav-lap-chip';
      timeEl.textContent = fmtTimer(state.idealSecs);
      timeEl.className = 'chip-time';
    }
  }

  // Update landmark rows — find next upcoming
  if (!state.navItems) return;
  let nextIdx = -1;
  state.navItems.forEach((item, i) => {
    if (nextIdx === -1 && elapsed < item.triggerSecs) nextIdx = i;
  });

  state.navItems.forEach((item, i) => {
    const row = document.getElementById(`nav-lm-row-${i}`);
    if (!row) return;
    const finClass = item.isFinish ? ' finish-row' : '';
    if (elapsed >= item.triggerSecs) {
      row.className = 'nav-lm-row passed' + finClass;
    } else if (i === nextIdx) {
      row.className = 'nav-lm-row next' + finClass;
    } else {
      row.className = 'nav-lm-row upcoming' + finClass;
    }
  });
}
  for (let i = 0; i < state.numLaps; i++) {
    const row    = document.getElementById(`lap-row-${i}`);
    const timeEl = document.getElementById(`lap-time-${i}`);
    if (i < state.currentLap) {
      row.className = 'lap-row done';
      const res = state.lapResults[i];
      timeEl.textContent = fmtTimer(res);
      timeEl.className   = 'lap-time ' + timerClass(res);
    } else if (i === state.currentLap && state.phase === 'running') {
      row.className      = 'lap-row active';
      timeEl.textContent = fmtTimer(currentRemaining);
      timeEl.className   = 'lap-time';
    } else {
      row.className      = 'lap-row inactive';
      timeEl.textContent = fmtTimer(state.idealSecs);
      timeEl.className   = 'lap-time';
    }
  }
}

function updateActionBtn() {
  const btn     = document.getElementById('action-btn');
  const hint    = document.getElementById('btn-hint');
  const navBtn  = document.getElementById('nav-action-btn');
  const navHint = document.getElementById('nav-btn-hint');

  if (state.phase === 'pre') {
    btn.className    = 'action-btn start';
    btn.textContent  = '(a) START';
    hint.textContent = '';
    navBtn.className    = 'action-btn start';
    navBtn.textContent  = '(a) START';
    navHint.textContent = '';
  } else if (state.phase === 'running') {
    const isLast = state.currentLap === state.numLaps - 1;
    const cls    = isLast ? 'action-btn finish' : 'action-btn lap';
    const lbl    = isLast ? '(a) FINISH' : '(a) LAP';
    const hint_  = `Lap ${state.currentLap + 1} of ${state.numLaps}`;
    btn.className    = cls; btn.textContent  = lbl; hint.textContent  = hint_;
    navBtn.className = cls; navBtn.textContent = lbl; navHint.textContent = hint_;
  }
}

// ── Beep scheduling ───────────────────────────────────────────────────────────
function checkBeeps(elapsed) {
  const ideal    = state.idealSecs;
  const isLast   = state.currentLap === state.numLaps - 1;
  const lapLabel = isLast ? 'FINISH' : 'LAP ' + (state.currentLap + 1);

  // Lap/finish countdown — 10 soft ticks before ideal time
  if (state.lapCountdown) {
    for (let i = 10; i >= 1; i--) {
      const triggerElapsed = ideal - i;
      if (triggerElapsed < 0) continue;
      const key = `lap-cd-${i}`;
      if (!state.firedBeeps.has(key) && elapsed >= triggerElapsed) {
        state.firedBeeps.add(key);
        beepCountdown(lapLabel, i);
      }
    }
  }

  // Lap/finish hit beep at ideal time
  const lapHitKey = 'lap-hit';
  if (!state.firedBeeps.has(lapHitKey) && elapsed >= ideal) {
    state.firedBeeps.add(lapHitKey);
    beepFinish();
    hideCountdown();
  }

  // Landmark beeps and their countdowns
  state.landmarks.forEach(lm => {
    const lmElapsed = lm.triggerSecs;

    // Landmark countdown
    if (state.lmCountdown) {
      for (let i = 10; i >= 1; i--) {
        const cdElapsed = lmElapsed - i;
        if (cdElapsed < 0) continue;
        const key = `lm-${lm.name}-cd-${i}`;
        if (!state.firedBeeps.has(key) && elapsed >= cdElapsed) {
          state.firedBeeps.add(key);
          beepCountdown(lm.name, i);
        }
      }
    }

    // Landmark hit
    const lmKey = `lm-${lm.name}-hit`;
    if (!state.firedBeeps.has(lmKey) && elapsed >= lmElapsed) {
      state.firedBeeps.add(lmKey);
      beepLandmark();
      hideCountdown();
    }
  });
}

// ── Main action ───────────────────────────────────────────────────────────────
function handleAction() {
  // Unlock audio on first interaction
  getAudioCtx();

  const now = performance.now();

  if (state.phase === 'pre') {
    state.phase        = 'running';
    state.lapStartTime = now;
    state.currentLap   = 0;
    state.firedBeeps   = new Set();
    document.getElementById('race-nav-label').textContent = 'Running';
    document.getElementById('nav-nav-label').textContent  = 'Running';
    updateActionBtn();
    noSleep.enable();
    startLoop();

  } else if (state.phase === 'running') {
    const elapsed   = (now - state.lapStartTime) / 1000;
    const remaining = state.idealSecs - elapsed;
    state.lapResults.push(remaining);

    const isLast = state.currentLap === state.numLaps - 1;
    if (isLast) {
      state.phase = 'finished';
      cancelAnimationFrame(state.rafId);
      state.rafId = null;
      noSleep.disable();
      updateLapRows(remaining);
      showResults();
    } else {
      state.currentLap++;
      state.lapStartTime = now;
      state.firedBeeps   = new Set();
      buildNavScreen();
      updateActionBtn();
    }
  }
}

function startLoop() {
  function tick() {
    if (state.phase !== 'running') return;
    const elapsed   = (performance.now() - state.lapStartTime) / 1000;
    const remaining = state.idealSecs - elapsed;
    updateLapRows(remaining);
    updateNavScreen(elapsed, remaining);
    checkBeeps(elapsed);
    state.rafId = requestAnimationFrame(tick);
  }
  state.rafId = requestAnimationFrame(tick);
}

// ── Results ───────────────────────────────────────────────────────────────────
function showResults() {
  const container = document.getElementById('result-laps');
  container.innerHTML = '';
  let penalty = 0;
  state.lapResults.forEach((res, i) => {
    penalty += Math.abs(res);
    const row = document.createElement('div');
    row.className = 'result-row';
    const cls = timerClass(res);
    row.innerHTML = `
      <div class="result-label">LAP ${i+1}</div>
      <div class="result-time ${cls}">${fmtTimer(res)}</div>
    `;
    container.appendChild(row);
  });
  document.getElementById('penalty-value').textContent = penalty.toFixed(2) + 's';

  // Also populate navigator result view — replace lm list with lap results
  const navList = document.getElementById('nav-lm-list');
  navList.innerHTML = '';
  state.lapResults.forEach((res, i) => {
    const cls = timerClass(res);
    const row = document.createElement('div');
    row.className = 'nav-lm-row';
    row.style.borderColor = 'var(--border)';
    row.innerHTML = `
      <div class="nav-lm-name" style="color:var(--muted)">LAP ${i+1}</div>
      <div class="nav-lm-display" style="font-size:1.4rem" class="${cls}">${fmtTimer(res)}</div>
    `;
    navList.appendChild(row);
  });
  // penalty in nav
  const penRow = document.createElement('div');
  penRow.className = 'nav-lm-row';
  penRow.style.cssText = 'border-top:1px solid var(--border);margin-top:8px;padding-top:14px;';
  penRow.innerHTML = `
    <div class="nav-lm-name" style="color:var(--muted);font-size:0.7rem;letter-spacing:0.1em">PENALTY</div>
    <div class="nav-lm-display" style="font-size:1.6rem;color:var(--amber)">${penalty.toFixed(2)}s</div>
  `;
  navList.appendChild(penRow);

  // Update nav action btn to RESET
  const navBtn = document.getElementById('nav-action-btn');
  navBtn.className   = 'action-btn reset';
  navBtn.textContent = '(a) RESET';
  navBtn.onclick     = goToRace;
  document.getElementById('nav-nav-label').textContent = 'Result';

  showScreen('result-screen');
}

// ── Init ──────────────────────────────────────────────────────────────────────
const noSleep = new NoSleep();
readSettings();
</script>
</body>
</html>
